version: "3.9"

services:
  backend:
    build: ./backend
    container_name: it-support-backend
    env_file: .env
    environment:
      - JWT_SECRET=change-this-in-production
    ports:
      - "8001:8000"

  frontend:
    build: ./frontend
    container_name: it-support-frontend
    depends_on:
      - backend
    ports:
      - "3001:80"


